syntax = "proto3";

package waves;

service WavesService {
    rpc CreateWave(CreateWaveRequest) returns (CreateWaveResponse);
    rpc GetWave(GetWaveRequest) returns (GetWaveResponse);
    rpc GetWaves(GetWavesRequest) returns (GetWavesResponse);
}

message CreateWaveRequest {
    string content = 1;
}

message CreateWaveResponse {
    string wave_id = 1;
    string content = 2;
    string created_at = 3;
}

message GetWavesRequest {
    int32 limit = 1;
    int32 offset = 2;
}

message GetWavesResponse {
    repeated Wave waves = 1;
}

message Wave {
    string wave_id = 1;
    string content = 2;
    string created_at = 3;
}

message GetWaveRequest {
    string wave_id = 1;
}

message GetWaveResponse {
    string wave_id = 1;
    string content = 2;
    string created_at = 3;
}
