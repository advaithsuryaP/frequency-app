syntax = "proto3";

package waves;

service WavesService {
    rpc CreateWave(CreateWaveRequest) returns (Wave);
    rpc GetWave(GetWaveRequest) returns (Wave);
    rpc GetWaves(GetWavesRequest) returns (GetWavesResponse);
    rpc DeleteWave(DeleteWaveRequest) returns (DeleteWaveResponse);
}

message CreateWaveRequest {
    string content = 1;
}

message GetWavesRequest {
    int32 limit = 1;
    int32 offset = 2;
}

message GetWavesResponse {
    repeated Wave waves = 1;
}

message Wave {
    string wave_id = 1;
    string content = 2;
    string created_at = 3;
    string updated_at = 4;
}

message GetWaveRequest {
    string wave_id = 1;
}

message DeleteWaveRequest {
    string wave_id = 1;
}

message DeleteWaveResponse {
    bool success = 1;
}
